commerce_shipmondo.settings:
  type: config_object
  label: 'Commerce Shipmondo settings'
  mapping:
    api_user_key:
      type: string
      label: 'API user key ID'
    api_key_key:
      type: string
      label: 'API key key ID'
    frontend_key_key:
      type: string
      label: 'Frontend key key ID'
    use_sandbox:
      type: boolean
      label: 'Use sandbox API'
    default_service_codes:
      type: string
      label: 'Default service codes'
    label_format:
      type: string
      label: 'Label format'
    own_agreement:
      type: boolean
      label: 'Own agreement'
    default_receiver_country_code:
      type: string
      label: 'Default receiver country code'
    receiver_phone_field:
      type: string
      label: 'Receiver phone field machine name'
    receiver_email_field:
      type: string
      label: 'Receiver email field machine name'
    sender:
      type: mapping
      label: 'Sender'
      mapping:
        name:
          type: string
          label: 'Name'
        address1:
          type: string
          label: 'Address line 1'
        address2:
          type: string
          label: 'Address line 2'
        zipcode:
          type: string
          label: 'Postal code'
        city:
          type: string
          label: 'City'
        country_code:
          type: string
          label: 'Country code'
        email:
          type: string
          label: 'Email'
        telephone:
          type: string
          label: 'Telephone'
        mobile:
          type: string
          label: 'Mobile'

commerce_shipmondo.shipping_methods:
  type: config_object
  label: 'Commerce Shipmondo shipping method mappings'
  mapping:
    mappings:
      type: ignore
